# Generated by GitHub Copilot
services:
  reverse-proxy:
    image: traefik:v3.1.5
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --providers.docker.network=automl-ha-edge
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/var/traefik/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --log.level=INFO
      - --accesslog=true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-data:/var/traefik
    restart: unless-stopped
    networks:
      - edge
    security_opt:
      - no-new-privileges:true

  postgres:
    image: postgres:16.4-alpine3.21
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:7.2.5-alpine3.21
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 5s
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./backend
    env_file:
      - .env.ha
    environment:
      - MLOPS_ENV=production
      - MLOPS_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - MLOPS_REDIS_URL=redis://redis:6379/0
      - MLOPS_ENFORCE_API_KEY=true
      - MLOPS_CORS_ORIGINS=https://${PUBLIC_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edge
      - internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=automl-ha-edge
      - traefik.http.routers.automl-api.rule=Host(`api.${PUBLIC_DOMAIN}`)
      - traefik.http.routers.automl-api.entrypoints=websecure
      - traefik.http.routers.automl-api.tls=true
      - traefik.http.routers.automl-api.tls.certresolver=letsencrypt
      - traefik.http.routers.automl-api.middlewares=automl-api-security
      - traefik.http.services.automl-api.loadbalancer.server.port=8000
      - traefik.http.middlewares.automl-api-security.headers.stsSeconds=31536000
      - traefik.http.middlewares.automl-api-security.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.automl-api-security.headers.stsPreload=true
      - traefik.http.middlewares.automl-api-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.automl-api-security.headers.frameDeny=true
      - traefik.http.middlewares.automl-api-security.headers.referrerPolicy=strict-origin-when-cross-origin
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 15s
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: https://api.${PUBLIC_DOMAIN}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - edge
    labels:
      - traefik.enable=true
      - traefik.docker.network=automl-ha-edge
      - traefik.http.routers.automl-ui.rule=Host(`${PUBLIC_DOMAIN}`)
      - traefik.http.routers.automl-ui.entrypoints=websecure
      - traefik.http.routers.automl-ui.tls=true
      - traefik.http.routers.automl-ui.tls.certresolver=letsencrypt
      - traefik.http.routers.automl-ui.middlewares=automl-ui-security
      - traefik.http.services.automl-ui.loadbalancer.server.port=80
      - traefik.http.middlewares.automl-ui-security.headers.stsSeconds=31536000
      - traefik.http.middlewares.automl-ui-security.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.automl-ui-security.headers.stsPreload=true
      - traefik.http.middlewares.automl-ui-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.automl-ui-security.headers.frameDeny=true
      - traefik.http.middlewares.automl-ui-security.headers.referrerPolicy=strict-origin-when-cross-origin
    security_opt:
      - no-new-privileges:true

networks:
  edge:
    name: automl-ha-edge
  internal:
    name: automl-ha-internal
    internal: true

volumes:
  postgres-data:
  redis-data:
  traefik-data:
