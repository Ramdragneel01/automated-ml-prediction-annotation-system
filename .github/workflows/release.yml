# Generated by GitHub Copilot
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

concurrency:
  group: automated-ml-prediction-annotation-system-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend compile check
        working-directory: backend
        run: python -m compileall -q .

      - name: Backend dependency consistency
        working-directory: backend
        run: python -m pip check

      - name: Backend test
        working-directory: backend
        run: pytest -q --maxfail=1

      - name: Backend dependency audit
        working-directory: backend
        run: |
          python -m pip install --upgrade pip-audit
          pip-audit -r requirements.txt --progress-spinner off

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --omit=dev --audit-level=high

      - name: Package frontend artifact
        run: tar -czf automated-ml-prediction-annotation-system-frontend-dist-${{
          github.ref_name }}.tgz -C frontend dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            automated-ml-prediction-annotation-system-frontend-dist-${{ github.ref_name }}.tgz
