# Generated by GitHub Copilot
services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      - MLOPS_ENV=production
      - MLOPS_DB_PATH=/app/data/automl_assistant.db
      - MLOPS_ENFORCE_API_KEY=true
    volumes:
      - app-data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    mem_limit: 768m
    cpus: 1.0
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://127.0.0.1:8000}
    ports:
      - "4173:80"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.50
    security_opt:
      - no-new-privileges:true

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.50

volumes:
  app-data:
  prometheus-data:
